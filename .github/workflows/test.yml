name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # at least a tag must be reachable

      - name: Configure
        run: |
           autoreconf -i
           ./configure --disable-dependency-tracking --enable-debug --enable-sanitize

      - name: Build
        run: make -j 4

      - name: Test
        run: make check
